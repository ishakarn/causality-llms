# ── Model ─────────────────────────────────────────────────────────────────────
model_id: "google/gemma-3-4b-it"
trust_remote_code: false
dtype: "bf16"

# ── Data ──────────────────────────────────────────────────────────────────────
data_path: "data/queries_easy.json"
splits_dir: "finetune/splits"
split_seed: 42
train_frac: 0.8
val_frac: 0.1
max_seq_length: 512

# ── LoRA ──────────────────────────────────────────────────────────────────────
# Gemma 3 uses a LLaMA-style transformer — same projection names.
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# ── Training ──────────────────────────────────────────────────────────────────
output_dir: "finetune/checkpoints"
run_name: "gemma3-4b-instruct-lora"

num_train_epochs: 5
per_device_train_batch_size: 4
per_device_eval_batch_size: 8
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
lr_scheduler_type: "cosine"
warmup_ratio: 0.05
weight_decay: 0.01
gradient_checkpointing: true
seed: 42

# ── Checkpointing & Evaluation ────────────────────────────────────────────────
eval_strategy: "epoch"
save_strategy: "epoch"
save_total_limit: 3
load_best_model_at_end: true
metric_for_best_model: "eval_loss"
greater_is_better: false
logging_steps: 10
report_to: "none"
