# ── Unsupervised CLM pretraining on CLADDER question text (Qwen2.5-3B) ────────
# Trains on the aggregate dataset (all variants combined) with no answer labels.
# After training, evaluate zero-shot via infer_vllm.py --lora_path.

# ── Model ─────────────────────────────────────────────────────────────────────
model_id: "Qwen/Qwen2.5-3B-Instruct"
trust_remote_code: false
dtype: "bf16"

# ── Data ──────────────────────────────────────────────────────────────────────
data_path: "data/cladder-v1-q-aggregate.json"
max_seq_length: 512

# ── LoRA ──────────────────────────────────────────────────────────────────────
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# ── Training ──────────────────────────────────────────────────────────────────
output_dir: "finetune/checkpoints/pretrain_clm"
run_name: "qwen3b_pretrain_clm"

num_train_epochs: 3
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
lr_scheduler_type: "cosine"
warmup_ratio: 0.05
weight_decay: 0.01
gradient_checkpointing: true
seed: 42

# ── Logging ───────────────────────────────────────────────────────────────────
logging_steps: 50
report_to: "none"
